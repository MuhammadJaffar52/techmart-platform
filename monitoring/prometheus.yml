global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "techmart-api"
    static_configs:
      - targets: ["techmart-service:3000"]
    metrics_path: /metrics

  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: techmart-api
        action: keep
