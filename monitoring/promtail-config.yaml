apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: techmart-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: techmart
              namespace: techmart
              __path__: /var/log/pods/techmart_*/*/*.log
