replicaCount: 2

namespace: techmart

image:
  repository: techmart-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3000
  type: ClusterIP

ingress:
  enabled: true
  host: techmart.local
  className: nginx

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 1Gi
  database: techmart
  user: postgres
  password: postgres

config:
  dbHost: postgres-service
  dbPort: "5432"
  dbName: techmart
  port: "3000"

probes:
  enabled: true
  readinessInitialDelay: 5
  livenessInitialDelay: 30
