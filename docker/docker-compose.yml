version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: techmart-db
    environment:
      POSTGRES_DB: techmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../app/backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../app/backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techmart"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - techmart-net

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    container_name: techmart-api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: techmart
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - techmart-net

volumes:
  postgres_data:

networks:
  techmart-net:
    driver: bridge
