apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techmart-ingress
  namespace: techmart
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: techmart-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: techmart-frontend-service
                port:
                  number: 80
