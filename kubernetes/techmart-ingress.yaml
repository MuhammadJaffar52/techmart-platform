apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techmart-ingress
  namespace: techmart
spec:
  ingressClassName: nginx
  rules:
    - host: techmart.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: techmart-service
                port:
                  number: 3000
