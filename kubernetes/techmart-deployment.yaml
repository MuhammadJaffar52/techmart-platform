apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmart-api
  namespace: techmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmart-api
  template:
    metadata:
      labels:
        app: techmart-api
    spec:
      containers:
        - name: api
          image: techmart-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: techmart-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: techmart-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: techmart-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: techmart-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: techmart-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techmart-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: techmart-service
  namespace: techmart
spec:
  selector:
    app: techmart-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
