<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechMart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    nav {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      position: sticky; top: 0; z-index: 100;
    }
    nav h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    nav h1 span { color: #e94560; }
    nav .badge {
      background: rgba(255,255,255,0.15); padding: 0.4rem 1rem;
      border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .badge .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .dot.green { background: #2ecc71; }
    .dot.red { background: #e74c3c; }
    .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }
    .hero {
      text-align: center; padding: 3rem 1rem; margin-bottom: 2rem;
    }
    .hero h2 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero p { color: #666; font-size: 1.1rem; }
    .stats {
      display: flex; gap: 1.5rem; justify-content: center; margin: 1.5rem 0 2.5rem; flex-wrap: wrap;
    }
    .stat-card {
      background: white; padding: 1.2rem 2rem; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; min-width: 140px;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: #0f3460; }
    .stat-card .label { font-size: 0.85rem; color: #888; margin-top: 0.2rem; }
    .filters {
      display: flex; gap: 0.8rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .filters button {
      padding: 0.5rem 1.2rem; border: 2px solid #e0e0e0; border-radius: 25px;
      background: white; cursor: pointer; font-size: 0.9rem; font-weight: 500;
      transition: all 0.2s;
    }
    .filters button:hover { border-color: #0f3460; color: #0f3460; }
    .filters button.active { background: #0f3460; color: white; border-color: #0f3460; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: white; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .card-img {
      height: 160px; display: flex; align-items: center; justify-content: center;
      font-size: 3rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: rgba(255,255,255,0.9);
    }
    .card-body { padding: 1.2rem; }
    .card-body h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .card-body p { color: #666; font-size: 0.88rem; line-height: 1.4; margin-bottom: 0.8rem; }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 0.8rem; border-top: 1px solid #f0f0f0;
    }
    .price { font-size: 1.3rem; font-weight: 700; color: #0f3460; }
    .stock {
      font-size: 0.8rem; padding: 0.25rem 0.6rem; border-radius: 12px; font-weight: 500;
    }
    .stock.high { background: #d5f5e3; color: #1e8449; }
    .stock.med { background: #fef9e7; color: #b7950b; }
    .stock.low { background: #fadbd8; color: #c0392b; }
    .category-tag {
      display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.6rem;
      border-radius: 10px; background: #eef2f7; color: #555; margin-bottom: 0.5rem;
    }
    .loading {
      text-align: center; padding: 4rem; color: #888; font-size: 1.1rem;
    }
    .loading .spinner {
      width: 40px; height: 40px; border: 4px solid #e0e0e0;
      border-top-color: #0f3460; border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      text-align: center; padding: 4rem; color: #e74c3c;
    }
    .error-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    footer {
      text-align: center; padding: 2rem; color: #888; font-size: 0.85rem;
      border-top: 1px solid #e0e0e0; margin-top: 3rem;
    }
    footer span { color: #e94560; }
    @media (max-width: 600px) {
      nav { flex-direction: column; gap: 0.5rem; text-align: center; }
      .hero h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <nav>
    <h1>Tech<span>Mart</span></h1>
    <div class="badge">
      <span class="dot green" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>
  </nav>

  <div class="container">
    <div class="hero">
      <h2>🛒 Product Catalog</h2>
      <p>Browse our curated collection of electronics and accessories</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalProducts">—</div>
        <div class="label">Products</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalStock">—</div>
        <div class="label">Total Stock</div>
      </div>
      <div class="stat-card">
        <div class="num" id="categories">—</div>
        <div class="label">Categories</div>
      </div>
    </div>

    <div class="filters" id="filters">
      <button class="active" data-category="all">All</button>
    </div>

    <div id="grid" class="grid">
      <div class="loading">
        <div class="spinner"></div>
        Loading products...
      </div>
    </div>
  </div>

  <footer>
    Tech<span>Mart</span> &mdash; DevOps Troubleshooting Lab &bull; API Connected
  </footer>

  <script>
    const API = '/api';

    const icons = {
      'Electronics': '💻', 'Accessories': '🔌',
      'default': '📦'
    };

    function getStockLabel(stock) {
      if (stock >= 50) return 'high';
      if (stock >= 20) return 'med';
      return 'low';
    }

    function renderCard(product) {
      return `
        <div class="card">
          <div class="card-img">${icons[product.category] || icons.default}</div>
          <div class="card-body">
            <span class="category-tag">${product.category}</span>
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <div class="card-footer">
              <span class="price">$${parseFloat(product.price).toFixed(2)}</span>
              <span class="stock ${getStockLabel(product.stock)}">${product.stock} in stock</span>
            </div>
          </div>
        </div>
      `;
    }

    async function loadProducts(category = 'all') {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading products...</div>';

      try {
        const res = await fetch(`${API}/products`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const products = await res.json();

        const filtered = category === 'all' ? products : products.filter(p => p.category === category);

        // Update stats
        document.getElementById('totalProducts').textContent = products.length;
        document.getElementById('totalStock').textContent = products.reduce((s, p) => s + p.stock, 0);
        const cats = [...new Set(products.map(p => p.category))];
        document.getElementById('categories').textContent = cats.length;

        // Build filter buttons
        const filterBar = document.getElementById('filters');
        filterBar.innerHTML = '<button class="active" data-category="all">All</button>';
        cats.forEach(c => {
          const btn = document.createElement('button');
          btn.textContent = c;
          btn.dataset.category = c;
          filterBar.appendChild(btn);
        });
        filterBar.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            filterBar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadProducts(btn.dataset.category);
          });
        });

        // Render grid
        if (filtered.length === 0) {
          grid.innerHTML = '<div class="loading">No products in this category</div>';
        } else {
          grid.innerHTML = filtered.map(renderCard).join('');
        }

        document.getElementById('statusText').textContent = 'Connected';
        document.getElementById('statusDot').className = 'dot green';

      } catch (err) {
        grid.innerHTML = `
          <div class="error-state">
            <div class="icon">⚠️</div>
            <h3>Could not load products</h3>
            <p>${err.message}</p>
          </div>
        `;
        document.getElementById('statusText').textContent = 'Disconnected';
        document.getElementById('statusDot').className = 'dot red';
      }
    }

    // Initial load
    loadProducts('all');

    // Auto-refresh every 30s
    setInterval(() => loadProducts(
      document.querySelector('#filters .active')?.dataset?.category || 'all'
    ), 30000);
  </script>
</body>
</html>
